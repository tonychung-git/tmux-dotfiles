# ── Prefix ────────────────────────────────────────────────────────────────────
unbind C-b
set -g prefix `
bind ` send-prefix

# ── Reload config ─────────────────────────────────────────────────────────────
unbind r
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# ── General ───────────────────────────────────────────────────────────────────
set -g mouse on
set -g history-limit 50000
set -sg escape-time 10
set -g focus-events on
set -g renumber-windows on

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

set -g base-index 1
set -g pane-base-index 1
setw -g pane-base-index 1

# Keep manually-named windows; don't auto-rename to current command
set -g allow-rename off
setw -g automatic-rename off

# ── Pane navigation (vim-style) ───────────────────────────────────────────────
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# ── Pane splits keep cwd ──────────────────────────────────────────────────────
unbind %
bind | split-window -h -c "#{pane_current_path}"
unbind '"'
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ── Copy mode (vi keys) ───────────────────────────────────────────────────────
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ── Status bar position ───────────────────────────────────────────────────────
set-option -g status-position top

# ── Plugins ───────────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux#v2.3.0'

# ── catppuccin (variables are evaluated at status-render time, so they can be
#    declared before or after the TPM run line — either works) ────────────────
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_date_time_text "%Y-%m-%d %H:%M"

# Initialize TMUX plugin manager
run '~/.tmux/plugins/tpm/tpm'

# ── Status line content ───────────────────────────────────────────────────────
# MUST come AFTER the TPM run line. -F expands once at set-time; if these lines
# ran before plugins were sourced, @catppuccin_status_* would still be undefined
# and -F would silently append empty strings. That's exactly the bug where only
# the first module showed up until `prefix + I` re-sourced the config.
set -g status-left-length 100
set -g status-right-length 100
set -g status-left "#{E:@catppuccin_status_session}"
set -g status-right "#{E:@catppuccin_status_date_time}"
